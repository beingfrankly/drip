[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false

# System packages needed before building. drip's `reqwest` dependency uses the
# native-tls feature (deliberately, not rustls-tls -- see CLAUDE.md), which on
# Linux needs the system OpenSSL dev headers/pkg-config to build against. macOS
# and Windows targets use their OS-native TLS backends via native-tls and need
# no extra system packages, so only `apt` entries are listed here.
[dist.dependencies.apt]
libssl-dev = "*"
pkg-config = "*"
